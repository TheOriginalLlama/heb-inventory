services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/0001_init.up.sql:ro

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://inventory:inventory@postgres:5432/inventory?sslmode=disable
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
