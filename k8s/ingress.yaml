apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heb-inventory
  namespace: heb-inventory
spec:
  rules:
    - host: inventory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: heb-inventory
                port:
                  number: 80
