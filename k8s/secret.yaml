# NOTE: Local development only. Do not commit real credentials.
# For production, use ExternalSecrets / Sealed Secrets / cloud secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: heb-inventory-secrets
  namespace: heb-inventory
type: Opaque
stringData:
  DATABASE_URL: "postgres://inventory:inventory@postgres:5432/inventory?sslmode=disable"
  POSTGRES_USER: "inventory"
  POSTGRES_PASSWORD: "inventory"
  POSTGRES_DB: "inventory"
