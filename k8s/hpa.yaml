apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: heb-inventory
  namespace: heb-inventory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: heb-inventory
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
